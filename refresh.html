<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>和太鼓リズムトレーナーを更新</title>
<style>
body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f4efe5;color:#291d18;font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic UI",sans-serif;padding:24px;box-sizing:border-box}
.card{width:min(460px,100%);background:#fffdf8;border-radius:18px;padding:24px;box-shadow:0 12px 34px rgba(56,35,20,.14);text-align:center}
h1{font-size:1.35rem;margin:0 0 12px}.spinner{width:42px;height:42px;border:5px solid #e4d8c8;border-top-color:#a62b27;border-radius:50%;margin:18px auto;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
p{line-height:1.7;color:#6e5d53}.error{color:#8b2e28;font-weight:700}</style>
</head>
<body>
<div class="card">
<h1>最新版へ更新しています</h1>
<div class="spinner"></div>
<p id="status">古いキャッシュを削除しています。しばらくお待ちください。</p>
</div>
<script>
(async()=>{
  const status=document.getElementById('status');
  try{
    if('serviceWorker' in navigator){
      const registrations=await navigator.serviceWorker.getRegistrations();
      await Promise.all(registrations.map(reg=>reg.unregister()));
    }
    if('caches' in window){
      const keys=await caches.keys();
      await Promise.all(keys.map(key=>caches.delete(key)));
    }
    status.textContent='更新が完了しました。最新版を開きます。';
    setTimeout(()=>location.replace('./?v=15&t='+Date.now()),500);
  }catch(error){
    status.className='error';
    status.textContent='自動更新に失敗しました。SafariまたはChromeでページを再読み込みしてください。';
  }
})();
</script>
</body>
</html>
